name: Build and Test CPM

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test_linux:
    name: Build and test the linux version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - beta
          - nightly
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}

      - name: Install dependencies and build project
        run: cargo build --verbose
      
      - name: Run tests
        run: cargo test --release --verbose
      
      - name: Upload craft executable
        uses: actions/upload-artifact@v4 
        with:
          name: craft linux executable
          path: ./craft/target/release/craft

  build_and_test_windows:
    name: Build and test the windows version
    runs-on: windows-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - beta
          - nightly
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
      
      - name: Install dependencies and build project
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Upload craft executable
        uses: actions/upload-artifact@v4
        with:
            name: craft windows executable
            path: ./craft/target/release/craft.exe


    

